    <script type="text/javascript">
      /*
        Recupera la ruta guardada por public/404.html
        y la restaura antes de que React Router monte la app.

        Ejemplo guardado:

        /gbqTestPage/especial/bpl1

        BrowserRouter usa basename="/gbqTestPage",
        por lo que React Router interpretará internamente:

        /especial/bpl1
      */

      (function () {
        var storageKey =
          "gbq_redirect_path";

        var repositoryBase =
          "/gbqTestPage";

        try {
          var redirectPath =
            sessionStorage.getItem(storageKey);

          if (!redirectPath) {
            return;
          }

          sessionStorage.removeItem(storageKey);

          /*
            Por seguridad, la dirección restaurada debe
            pertenecer al proyecto actual.
          */
          var belongsToRepository =
            redirectPath === repositoryBase ||
            redirectPath ===
              repositoryBase + "/" ||
            redirectPath.indexOf(
              repositoryBase + "/"
            ) === 0;

          if (!belongsToRepository) {
            return;
          }

          var currentUrl =
            window.location.pathname +
            window.location.search +
            window.location.hash;

          if (redirectPath !== currentUrl) {
            window.history.replaceState(
              null,
              "",
              redirectPath
            );
          }
        } catch (error) {
          console.error(
            "[GBQ index] No fue posible restaurar la ruta:",
            error
          );

          sessionStorage.removeItem(
            storageKey
          );
        }
      })();
    </script>
