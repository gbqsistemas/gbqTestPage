<!-- public/404.html -->
<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />

    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />

    <meta name="robots" content="noindex" />

    <title>GBQ | Redireccionando...</title>

    <script type="text/javascript">
      /*
        GitHub Pages SPA fallback para:

        https://gbqsistemas.github.io/gbqTestPage/

        Ejemplo:

        El usuario abre:
        /gbqTestPage/especial/bpl1

        GitHub Pages sirve este 404.html.

        El script:
        1. Guarda la dirección completa solicitada.
        2. Redirige a /gbqTestPage/.
        3. index.html recupera la dirección.
        4. BrowserRouter muestra la ruta correcta.

        Esta key debe coincidir exactamente con index.html.
      */

      (function () {
        var storageKey =
          "gbq_redirect_path";

        var repositoryBase =
          "/gbqTestPage";

        var pathname =
          window.location.pathname || "/";

        var search =
          window.location.search || "";

        var hash =
          window.location.hash || "";

        /*
          Solo aceptamos rutas pertenecientes al repositorio.

          Evita guardar accidentalmente una ruta externa
          o perteneciente a otro proyecto.
        */
        var belongsToRepository =
          pathname === repositoryBase ||
          pathname === repositoryBase + "/" ||
          pathname.indexOf(
            repositoryBase + "/"
          ) === 0;

        if (!belongsToRepository) {
          window.location.replace(
            window.location.origin +
              repositoryBase +
              "/"
          );

          return;
        }

        var redirectPath =
          pathname + search + hash;

        try {
          sessionStorage.setItem(
            storageKey,
            redirectPath
          );
        } catch (error) {
          console.error(
            "[GBQ 404] No fue posible guardar la ruta solicitada:",
            error
          );
        }

        window.location.replace(
          window.location.origin +
            repositoryBase +
            "/"
        );
      })();
    </script>
  </head>

  <body>
    <noscript>
      GBQ requiere JavaScript para continuar.
    </noscript>

    <p>Redireccionando a GBQ...</p>
  </body>
</html>
